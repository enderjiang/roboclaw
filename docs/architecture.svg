  <rect x="251" y="251" width="152" height="26" rx="5" fill="#0e1f3a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="327" y="268" text-anchor="middle" font-size="9" fill="#7dd3fc">SSL/TLS Termination</text>

