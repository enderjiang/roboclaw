  <line x1="669" y1="495" x2="718" y2="495" stroke="#ffb74d" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
  <text x="693" y="488" text-anchor="middle" font-size="8" fill="#8b949e">I²C</text>

