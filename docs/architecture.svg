  <text x="566" y="131" text-anchor="middle" font-size="10" fill="#8b949e" font-weight="bold" letter-spacing="1">ESP32  (STA MODE)</text>
  <text x="566" y="146" text-anchor="middle" font-size="9" fill="#3fb950">WiFi Client</text>

