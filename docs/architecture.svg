  <text x="934" y="418" text-anchor="middle" font-size="10" fill="#8b949e" font-weight="bold" letter-spacing="1">COMPARE</text>
  <line x1="870" y1="425" x2="998" y2="425" stroke="#30363d" stroke-width="1"/>

  <text x="874" y="441" font-size="8" fill="#8b949e">Access</text>
  <text x="874" y="454" font-size="8" fill="#7ec8e3">☁ Internet-wide</text>
  <text x="874" y="466" font-size="8" fill="#81c784">⚡ LAN only</text>

