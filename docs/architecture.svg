  <text x="327" y="204" text-anchor="middle" font-size="9" fill="#7dd3fc">WebSocket Router</text>

  <rect x="251" y="219" width="152" height="26" rx="5" fill="#0e1f3a" stroke="#1d4ed8" stroke-width="1"/>
