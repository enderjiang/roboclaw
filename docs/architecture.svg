  <text x="786" y="506" text-anchor="middle" font-size="8" fill="#8b949e">L2 = 90 mm</text>
  <text x="786" y="521" text-anchor="middle" font-size="8" fill="#8b949e">L_END = 97 mm</text>
  <text x="786" y="536" text-anchor="middle" font-size="8" fill="#8b949e">H_BASE = 77 mm</text>
  <text x="786" y="555" text-anchor="middle" font-size="9" fill="#3fb950">6-DOF arm</text>

  <!-- ── COMPARE PANEL ── -->
