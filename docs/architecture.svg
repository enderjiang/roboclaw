<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="660" viewBox="0 0 1020 660" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64b5f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#81c784"/>
    </marker>
    <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffb74d"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#21262d;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1020" height="660" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="510" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#e6edf3" letter-spacing="0.5">ESP32 6-DOF Robot Arm — Control Architectures</text>
  <line x1="80" y1="48" x2="940" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ARCH 1: CLOUD RELAY -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <text x="20" y="72" font-size="12" font-weight="bold" fill="#7ec8e3" letter-spacing="1">ARCH 1 — CLOUD-RELAY CLIENT</text>
  <text x="20" y="88" font-size="10" fill="#484f58">esp32_cloud_client.ino · WiFi STA · roboclaw-production.up.railway.app:443</text>

  <!-- Panel background -->
  <rect x="14" y="95" width="992" height="238" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- ── CLIENTS box ── -->
