<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RoboClaw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --accent:#58a6ff;--green:#3fb950;--red:#f85149;--text:#e6edf3;--muted:#8b949e;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:15px;font-weight:700;flex:1}
.nav{display:flex;gap:3px}
.navbtn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
.navbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.statuses{display:flex;gap:10px}
.sitem{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green)}

/* ── Pages ── */
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex}

/* ══ CONTROL PAGE ══ */
#pg-control{padding:12px;gap:12px;overflow-y:auto}

/* Two-column grid: canvas left (fixed), controls right (flex) */
.ctrl-grid{
  display:grid;
  grid-template-columns:min(424px,48%) 1fr;
  gap:12px;
  width:100%;
  align-items:start;
}

/* ── Canvas card ── */
.canvas-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;width:fit-content;max-width:100%}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center}
.canvas-hint{font-size:10px;color:var(--muted);margin-top:5px;text-align:center}
#wsCanvas{display:block;width:400px;height:400px;max-width:100%;border-radius:5px;cursor:crosshair;background:#080c10}

/* ── Right column ── */
.right-col{display:flex;flex-direction:column;gap:10px}

/* ── Generic card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}

/* XYZ inputs: 2×2 grid */
.xyz-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.field input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:6px 9px;font-size:13px;width:100%;outline:none;font-weight:600}
.field input:focus{border-color:var(--accent)}

/* Buttons */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn{padding:8px 6px;border:none;border-radius:7px;font-size:12px;font-weight:700;
  cursor:pointer;transition:opacity .15s;text-align:center}
.btn:hover{opacity:.8}
.btn-blue{background:var(--accent);color:#fff}
.btn-green{background:#2d5a2d;color:var(--green);border:1px solid #3a7a3a}
.btn-indigo{background:#1a2a4a;color:#7eb3ff;border:1px solid #2a4a7a}
.btn-purple{background:#2d1a4a;color:#c4a0ff;border:1px solid #4a2a7a}
.btn-full{grid-column:1/-1}

/* Compact sliders — 2 per row */
.slider-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.sl-item{display:flex;flex-direction:column;gap:3px}
.sl-header{display:flex;justify-content:space-between;align-items:baseline}
.sl-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.sl-val{font-size:12px;font-weight:700;color:var(--green)}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--surface2);
  border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 4px rgba(88,166,255,.4)}

/* ══ AGENT PAGE ══ */
#pg-agent{padding:12px;gap:12px;overflow:hidden}
.agent-grid{display:grid;grid-template-columns:1fr 260px;gap:12px;width:100%;height:100%}
.agent-left{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);
  border:1px solid var(--border);border-radius:10px}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.msg.assistant{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:3px}
.msg.system{align-self:center;color:var(--muted);font-size:11px;font-style:italic;padding:2px 0}
.msg-time{font-size:9px;opacity:.55;margin-top:2px}
.chat-bar{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:flex-end}
.chat-bar textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:7px 10px;font-size:13px;resize:none;outline:none;
  min-height:36px;max-height:90px;font-family:inherit}
.chat-bar textarea:focus{border-color:var(--accent)}
.agent-right{display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.log-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.log-row{background:var(--surface2);border-radius:5px;padding:6px 8px;font-size:11px;line-height:1.4}
.log-badge{display:inline-block;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;margin-right:4px}
.b-api{background:#1e3a5f;color:var(--accent)}
.b-browser{background:#1a3a1f;color:var(--green)}
.b-sequence{background:#3a2210;color:#ff9a60}
.log-coords{color:var(--text)}
.log-t{color:var(--muted)}
.seq-box{border-radius:6px;padding:8px 10px;font-size:12px}
.seq-idle{background:var(--surface2);color:var(--muted)}
.seq-run{background:#0f2a0f;color:var(--green);border:1px solid #2a4a2a}
.seq-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px}
.seq-fill{height:100%;background:var(--green);transition:width .3s;border-radius:2px}

/* Responsive */
@media(max-width:700px){
  #pg-control{flex-direction:column}
  .ctrl-grid{grid-template-columns:1fr}
  .agent-grid{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .agent-right{max-height:180px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🤖 RoboClaw</h1>
  <div class="nav">
    <button class="navbtn active" onclick="showPage('control',this)">Control</button>
    <button class="navbtn" onclick="showPage('agent',this)">Agent</button>
  </div>
  <div class="statuses">
    <div class="sitem"><div class="dot" id="dotSrv"></div>Server</div>
    <div class="sitem"><div class="dot" id="dotESP"></div>ESP32</div>
  </div>
</div>

<!-- ══ CONTROL PAGE ══════════════════════════════════════════════ -->
<div class="page active" id="pg-control">
<div class="ctrl-grid">

  <!-- Left: 2D workspace canvas -->
  <div class="canvas-card">
    <div class="card-title">
      <span>Workspace Map</span>
      <span style="font-size:10px">🟢 current &nbsp; 🟠 target &nbsp; click = set X/Z</span>
    </div>
    <!-- 500×500 internal px · 1 mm/px · side view X:−200→300 Z:−200→300 · displayed at 400×400 -->
    <canvas id="wsCanvas" width="500" height="500"></canvas>
    <div class="canvas-hint">Side view (X forward, Z height) · click = set X / Z &nbsp;|&nbsp; Y via input · 1 px = 1 mm</div>
  </div>

  <!-- Right: controls -->
  <div class="right-col">

    <!-- XYZ position card -->
    <div class="card">
      <div class="card-title">Target Position</div>
      <div class="xyz-grid">
        <div class="field"><label>X · Forward (mm)</label><input type="number" id="ik_x" value="150" step="5"></div>
        <div class="field"><label>Y · Right/Left (mm)</label><input type="number" id="ik_y" value="0" step="5"></div>
        <div class="field"><label>Z · Height (mm)</label><input type="number" id="ik_z" value="100" step="5"></div>
        <div class="field"><label>Pitch (°)</label><input type="number" id="ik_pitch" value="0" step="5"></div>
      </div>
      <div class="btn-grid">
        <button class="btn btn-blue btn-full" onclick="sendIK()">▶ Move to Position</button>
        <button class="btn btn-green" onclick="sendHome()">⌂ Home</button>
        <button class="btn btn-green" onclick="sendWS({type:'get_state'})">↺ Sync</button>
        <button class="btn btn-indigo" onclick="sendGripper(0)">◎ Open</button>
        <button class="btn btn-purple" onclick="sendGripper(180)">● Close</button>
      </div>
    </div>

    <!-- Compact sliders -->
    <div class="card">
      <div class="card-title">Manual Joints</div>
      <div class="slider-grid" id="sliders"></div>
    </div>

  </div>
</div>
</div>

<!-- ══ AGENT PAGE ════════════════════════════════════════════════ -->
<div class="page" id="pg-agent">
<div class="agent-grid">

  <div class="agent-left">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-bar">
      <textarea id="chatInput" placeholder="Message or XYZ e.g. 150 0 100 …" rows="1"></textarea>
      <button class="btn btn-blue" onclick="chatSend()" style="padding:8px 14px;white-space:nowrap">Send</button>
    </div>
  </div>

  <div class="agent-right">
    <div class="card">
      <div class="card-title">Sequence</div>
      <div class="seq-box seq-idle" id="seqStatus">Idle</div>
      <button class="btn btn-full" id="stopSeqBtn"
        style="display:none;margin-top:8px;background:#4a1a1a;color:var(--red);border:1px solid #7a2a2a;font-size:12px;font-weight:700;padding:6px"
        onclick="sendWS({type:'sequence_stop'})">■ Stop Sequence</button>
    </div>
    <div class="card" style="flex:1;min-height:0">
      <div class="card-title">Movement Log</div>
      <div class="log-list" id="xyzLog"><div style="color:var(--muted);font-size:11px">No moves yet</div></div>
    </div>
  </div>

</div>
</div>

<script>
// ── WebSocket ──────────────────────────────────────────────────────
const WS_URL = (location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/browser';
let ws=null, angles=[90,90,90,90,90,90];
const NAMES=['Base','Shoulder','Elbow','Wrist','Wrist2','Gripper'];

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen =()=>dot('dotSrv',true);
  ws.onclose=()=>{ dot('dotSrv',false); dot('dotESP',false); setTimeout(connect,3000); };
  ws.onerror=()=>{};
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if      (d.type==='state'&&d.angles)       { angles=d.angles; updateSliders(d.angles); drawCanvas(); }
      else if (d.type==='esp32_status')           { dot('dotESP',d.connected); }
      else if (d.type==='chat_message')           { addMsg(d.role||'assistant',d.text,d.ts); }
      else if (d.type==='cmd_log')                { renderLog(d.entries); }
      else if (d.type==='sequence_start')         { seqUI(true,`Running · ${d.total} steps${d.loop?' ∞':''}`,0,d.total); }
      else if (d.type==='sequence_step')          { seqUI(true,`Step ${d.step}/${d.total}`,d.step,d.total); }
      else if (d.type==='sequence_done')          { seqUI(false,'Done'); addMsg('system','Sequence complete.'); }
      else if (d.type==='sequence_stopped')       { seqUI(false,'Stopped'); }
    }catch{}
  };
}
connect();

function dot(id,on){ document.getElementById(id).className='dot'+(on?' on':''); }
function sendWS(cmd){ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(cmd)); }

// ── Actions ────────────────────────────────────────────────────────
const fId=id=>document.getElementById(id);
function sendIK(){
  const x=+fId('ik_x').value||150, y=+fId('ik_y').value||0,
        z=+fId('ik_z').value||100, pitch=+fId('ik_pitch').value||0;
  sendWS({type:'ik_move',x,y,z,pitch});
  targetX=x; targetZ=z; drawCanvas();
}
function sendHome()    { sendWS({type:'move_all',angles:[90,90,90,90,90,90]}); }
function sendGripper(a){ sendWS({type:'move',channel:5,angle:a}); }

// ── Sliders (2-column compact grid) ────────────────────────────────
(function(){
  const c=fId('sliders');
  NAMES.forEach((n,i)=>{
    c.innerHTML+=`<div class="sl-item">
      <div class="sl-header"><span class="sl-name">${n}</span><span class="sl-val" id="sv_${i}">90°</span></div>
      <input type="range" id="sl_${i}" min="0" max="180" value="90">
    </div>`;
  });
  NAMES.forEach((_,i)=>{
    fId(`sl_${i}`).addEventListener('input',function(){
      const a=parseInt(this.value);
      fId(`sv_${i}`).textContent=a+'°';
      sendWS({type:'move',channel:i,angle:a});
    });
  });
})();

function updateSliders(a){
  a.forEach((v,i)=>{
    const sl=fId(`sl_${i}`), sv=fId(`sv_${i}`);
    if(sl&&Math.abs(sl.value-v)>1) sl.value=v;
    if(sv) sv.textContent=Math.round(v)+'°';
  });
}

// ── 2D Workspace Canvas (SIDE VIEW: X forward, Z height) ─────────────
const CV=fId('wsCanvas'), ctx=CV.getContext('2d');
const CW=500, CH=500;
const WX_MIN=-200, WX_MAX=300, WZ_MIN=-200, WZ_MAX=300;

function w2c(wx,wz){ return [wx-WX_MIN, WZ_MAX-wz]; }
function c2w(cx,cy){ return {x:cx+WX_MIN, z:WZ_MAX-cy}; }

let wsPts=null, targetX=150, targetZ=100, hoverWX=-9999, hoverWZ=-9999;

setTimeout(()=>{
  const PI=Math.PI, L1=90, L2=90, LE=97, HB=77;
  const set=new Set();
  for(let s=0;s<=180;s+=3){
    const p1=(180-s)*PI/180;
    for(let e=0;e<=180;e+=3){
      const p2=p1-e*PI/180;
      for(let w=0;w<=180;w+=15){
        const pg=p2+(w-90)*PI/180;
        const wx=L1*Math.cos(p1)+L2*Math.cos(p2)+LE*Math.cos(pg);
        const wz=HB+L1*Math.sin(p1)+L2*Math.sin(p2)+LE*Math.sin(pg);
        const [cx,cy]=[Math.round(wx-WX_MIN), Math.round(WZ_MAX-wz)];
        if(cx>=0&&cx<CW&&cy>=0&&cy<CH) set.add(cx*512+cy);
      }
    }
  }
  wsPts=[...set].map(v=>[v>>9, v&0x1ff]);
  drawCanvas();
},50);

function fkXZ(base,shoulder,elbow,wrist){
  const PI=Math.PI, L1=90, L2=90, LE=97, HB=77;
  const p1=(180-shoulder)*PI/180, p2=p1-elbow*PI/180;
  const pg=p2+(wrist-90)*PI/180;
  const R=L1*Math.cos(p1)+L2*Math.cos(p2)+LE*Math.cos(pg);
  const wz=HB+L1*Math.sin(p1)+L2*Math.sin(p2)+LE*Math.sin(pg);
  const wa=(90-base)*PI/180;
  return {x:R*Math.cos(wa), z:wz};
}

function drawCanvas(){
  ctx.clearRect(0,0,CW,CH);

  ctx.strokeStyle='#141a22'; ctx.lineWidth=1;
  for(let wx=WX_MIN;wx<=WX_MAX;wx+=50){
    const cx=wx-WX_MIN;
    ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,CH);ctx.stroke();
  }
  for(let wz=WZ_MIN;wz<=WZ_MAX;wz+=50){
    const cy=WZ_MAX-wz;
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(CW,cy);ctx.stroke();
  }

  const [ox,oz]=w2c(0,0);
  ctx.strokeStyle='#1e3040'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,oz);ctx.lineTo(CW,oz);ctx.stroke();

  const [,sy]=w2c(0,77);
  ctx.strokeStyle='#1e3040'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(CW,sy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#2a4060'; ctx.font='9px monospace';
  ctx.fillText('shoulder 77mm',ox+4,sy-3);

  if(wsPts){
    ctx.fillStyle='rgba(88,166,255,0.25)';
    for(const [cx,cy] of wsPts) ctx.fillRect(cx,cy,1.5,1.5);
  }

  if(hoverWX>-9000){
    const [hcx,hcy]=w2c(hoverWX,hoverWZ);
    ctx.strokeStyle='rgba(255,200,80,0.25)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath();ctx.moveTo(hcx,0);ctx.lineTo(hcx,CH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,hcy);ctx.lineTo(CW,hcy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,200,80,0.65)'; ctx.font='10px monospace';
    ctx.fillText(`x${Math.round(hoverWX)} z${Math.round(hoverWZ)}`,hcx+4,hcy-4);
  }

  const [tcx,tcy]=w2c(targetX,targetZ);
  ctx.strokeStyle='#ff6b35'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(tcx,0);ctx.lineTo(tcx,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,tcy);ctx.lineTo(CW,tcy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#ff6b35';
  ctx.beginPath();ctx.arc(tcx,tcy,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,107,53,0.2)';
  ctx.beginPath();ctx.arc(tcx,tcy,10,0,Math.PI*2);ctx.fill();

  const p=fkXZ(angles[0],angles[1],angles[2],angles[3]);
  const [pcx,pcy]=w2c(p.x,p.z);
  if(pcx>=0&&pcx<CW&&pcy>=0&&pcy<CH){
    ctx.fillStyle='#3fb950';
    ctx.beginPath();ctx.arc(pcx,pcy,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(63,185,80,0.35)'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pcx,pcy,10,0,Math.PI*2);ctx.stroke();
  }

  ctx.fillStyle='#c09030';
  ctx.beginPath();ctx.arc(ox,oz,5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(192,144,48,0.4)'; ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(ox,oz,10,0,Math.PI*2);ctx.stroke();

  ctx.fillStyle='#2a3e52'; ctx.font='9px monospace';
  [-200,-100,0,100,200,300].forEach(v=>{
    const cx=v-WX_MIN;
    if(cx>14&&cx<CW-4) ctx.fillText(v,cx-8,CH-3);
  });
  [-200,-100,0,100,200,300].forEach(v=>{
    const cy=WZ_MAX-v;
    if(cy>5&&cy<CH-5) ctx.fillText(v,2,cy+3);
  });
  ctx.fillStyle='#3a5060'; ctx.font='10px monospace';
  ctx.fillText('X →',CW-22,CH-4);
  ctx.save();ctx.translate(12,30);ctx.rotate(-Math.PI/2);ctx.fillText('Z ↑',0,0);ctx.restore();
}

CV.addEventListener('click',e=>{
  const r=CV.getBoundingClientRect();
  const cx=(e.clientX-r.left)*CW/r.width, cy=(e.clientY-r.top)*CH/r.height;
  const {x,z}=c2w(cx,cy);
  const rx=Math.round(x/5)*5, rz=Math.round(z/5)*5;
  fId('ik_x').value=Math.max(-190,Math.min(290,rx));
  fId('ik_z').value=Math.max(-190,Math.min(290,rz));
  targetX=rx; targetZ=rz; drawCanvas();
});
CV.addEventListener('mousemove',e=>{
  const r=CV.getBoundingClientRect();
  const cx=(e.clientX-r.left)*CW/r.width, cy=(e.clientY-r.top)*CH/r.height;
  const {x,z}=c2w(cx,cy); hoverWX=x; hoverWZ=z; drawCanvas();
});
CV.addEventListener('mouseleave',()=>{ hoverWX=-9999;drawCanvas(); });

// ── Agent chat ─────────────────────────────────────────────────────
const chatEl=fId('chatMsgs'), chatIn=fId('chatInput');
chatIn.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chatSend();} });
chatIn.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';});

function chatSend(){
  const txt=chatIn.value.trim(); if(!txt)return;
  chatIn.value=''; chatIn.style.height='auto';
  addMsg('user',txt);
  const m=txt.match(/^(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)(?:[,\s]+(-?\d+(?:\.\d+)?))?$/);
  if(m){
    const x=+m[1],y=+m[2],z=+m[3],pitch=m[4]?+m[4]:0;
    sendWS({type:'ik_move',x,y,z,pitch});
    fId('ik_x').value=x; fId('ik_y').value=y; fId('ik_z').value=z;
    targetX=x; targetZ=z; drawCanvas();
    addMsg('system',`→ move (${x}, ${y}, ${z}) pitch=${pitch}`);
  }
}

function addMsg(role,text,ts){
  const d=document.createElement('div');
  d.className='msg '+role;
  const t=ts?new Date(ts):new Date();
  const tm=`${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
  d.innerHTML=esc(text)+(role!=='system'?`<div class="msg-time">${tm}</div>`:'');
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
}

function renderLog(entries){
  const moves=(entries||[]).filter(e=>e.cmd&&e.cmd.type==='ik_move');
  const el=fId('xyzLog');
  if(!moves.length){el.innerHTML='<div style="color:var(--muted);font-size:11px">No moves yet</div>';return;}
  el.innerHTML=moves.slice(0,25).map(e=>{
    const c=e.cmd, t=new Date(e.ts);
    const tm=`${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
    const src=e.source||'api';
    return `<div class="log-row">
      <span class="log-badge b-${src}">${src}</span>
      <span class="log-coords">X${c.x} Y${c.y} Z${c.z}${c.pitch?` P${c.pitch}`:''}</span>
      <span class="log-t"> ${tm}</span>
    </div>`;
  }).join('');
}

function seqUI(on,text,step,total){
  const el=fId('seqStatus'), btn=fId('stopSeqBtn');
  el.className='seq-box '+(on?'seq-run':'seq-idle');
  const pct=total?Math.round(step/total*100):0;
  el.innerHTML=esc(text)+(on&&total?`<div class="seq-bar"><div class="seq-fill" style="width:${pct}%"></div></div>`:'');
  btn.style.display=on?'':'none';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function showPage(n,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  fId('pg-'+n).classList.add('active'); if(el)el.classList.add('active');
}

drawCanvas();
addMsg('system','Connected · waiting for ESP32…');
</script>
</body>
</html>
